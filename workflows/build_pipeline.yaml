name: build_pipeline
description: Full TDD build pipeline from requirements to validated, production-ready Django app code
version: "2.0"

input:
  app_name:
    type: string
    required: true
  requirements_artifact:
    type: string
    required: true
    description: Path to the requirements JSON artifact
  design_artifact:
    type: string
    required: false
    description: Path to artifacts/specs/YYYY-MM-DD-<feature>.md — produced by /superjeff:brainstorm
    warning_if_missing: "No design artifact found. Run /superjeff:brainstorm first for new features."

stages:
  - id: check_design
    name: Design Artifact Check
    description: Warn if no design document exists for this feature
    action: check_file_exists
    input:
      file: "{{ input.design_artifact }}"
    on_missing: warn
    # Does not halt — allows bug fixes and minor additions to skip brainstorm

  - id: plan
    name: Implementation Planning
    description: >
      Decompose requirements into a granular, dependency-ordered task list.
      Each task targets 2-5 minutes of focused work.
      Every task has an exact file path, complete code, a verify command, and a commit message.
      See skills/planning/SKILL.md for the task format.
    skill: skills/planning/SKILL.md
    input:
      requirements: "{{ input.requirements_artifact }}"
      design: "{{ input.design_artifact }}"
    output:
      artifact: "artifacts/plans/{{ input.app_name }}_plan.md"
    rules:
      - task_size_target: "2-5 minutes each"
      - task_order:
          - exceptions
          - models
          - migrations
          - factories
          - tests_red
          - services
          - permissions
          - serializers
          - views_html
          - views_api
          - urls
          - signals
          - verify_green
      - every_task_has_exact_file_path: true
      - every_task_has_complete_code: true
      - every_task_has_verify_command: true
      - every_task_has_commit_message: true
      - tests_before_implementations: true
    on_failure: halt

  - id: write_tests
    name: Write Failing Tests (RED)
    description: >
      For every test case in the requirements, write a pytest test using APIClient and factory_boy.
      Run all new tests and confirm they FAIL before proceeding.
      A test that passes before implementation is wrong — fix it.
    skill: skills/testing/SKILL.md
    input:
      requirements: "{{ input.requirements_artifact }}"
      plan: "{{ stages.plan.output }}"
    output:
      artifact: "artifacts/tests/{{ input.app_name }}/"
    rules:
      - use_pytest_not_unittest: true
      - use_factory_boy_not_objects_create: true
      - use_api_client_not_django_client: true
      - all_new_tests_must_fail_before_implementation: true
      - each_endpoint_minimum_5_tests: true
      - tests_include_edge_cases_per_business_rule: true
    verify:
      command: "pytest artifacts/tests/{{ input.app_name }}/ -v"
      expected: "all new tests FAIL"
    on_failure: halt

  - id: implement
    name: Implement to Pass Tests (GREEN)
    description: >
      Execute the plan task by task. After each task, run the task's verify command.
      Do not proceed to the next task until the current task's verify passes.
      Implementation order is fixed: exceptions → models → migrations → services →
      permissions → serializers → views → urls → signals.
      Architecture rules (FBV only, service layer mandatory, no direct ORM in views)
      are enforced per instincts/claude-rules-template.md.
    skill: skills/planning/SKILL.md
    input:
      plan: "{{ stages.plan.output }}"
      requirements: "{{ input.requirements_artifact }}"
    output:
      artifact: "artifacts/code/{{ input.app_name }}/"
    rules:
      - follow_plan_task_order: true
      - verify_after_each_task: true
      - no_cbv_no_viewset_no_router: true
      - all_views_delegate_to_service: true
      - no_direct_orm_in_views: true
      - models_are_dumb: true
      - no_fields_all_in_serializers: true
      - run_makemigrations_after_model_changes: true
      - all_tests_must_pass_after_implementation: true
    verify:
      command: "pytest apps/{{ input.app_name }}/ -v --tb=short"
      expected: "all tests PASS, 0 failures"
    on_failure: halt

  - id: code_review
    name: Code Review — Spec Compliance + Quality
    description: >
      Two-stage review per skills/code-review/SKILL.md.
      Stage 1: does the code match the requirements artifact?
      Stage 2: does the code follow Django architecture rules?
      Review findings become tasks — fix before proceeding to Quality Agent.
    skill: skills/code-review/SKILL.md
    input:
      code: "{{ stages.implement.output }}"
      requirements: "{{ input.requirements_artifact }}"
    output:
      findings: "artifacts/reports/{{ input.app_name }}_code_review.json"
    on_failure: halt_on_critical

  - id: verify_green
    name: Verification Gate (post-review)
    description: >
      Fresh full-suite test run after code review fixes.
      Run pytest, check migrations, run architecture grep checks.
      Show actual output — never claim tests pass without evidence.
      See skills/verification/SKILL.md.
    skill: skills/verification/SKILL.md
    input:
      code: "{{ stages.code_review.output }}"
      app_name: "{{ input.app_name }}"
    verify:
      - command: "pytest apps/{{ input.app_name }}/ -v"
        expected: "all PASSED"
      - command: "python manage.py migrate --check"
        expected: "No migrations to apply"
      - command: "grep -rn 'class.*APIView\\|ModelViewSet' apps/ api/"
        expected: "no output"
      - command: "grep -rn \"fields = '__all__'\" apps/ api/"
        expected: "no output"
    on_failure: halt

  - id: quality_audit
    name: Quality Agent Audit
    description: Automated quality gate — 5-gate structured audit including architecture compliance.
    agent: agents/quality/quality-agent.md
    input:
      code: "{{ stages.verify_green.output }}"
      requirements: "{{ input.requirements_artifact }}"
    output:
      report: "artifacts/reports/{{ input.app_name }}_quality.json"
    on_failure: halt_on_critical

  - id: security_review
    name: Security Agent Audit
    description: OWASP Top 10 audit against all generated code.
    agent: agents/security/security-agent.md
    input:
      code: "{{ stages.verify_green.output }}"
    output:
      report: "artifacts/reports/{{ input.app_name }}_security.json"
    on_failure: halt_on_critical

  - id: validate
    name: Final Validation Gate
    action: run_all_checks
    input:
      code: "{{ stages.verify_green.output }}"
      quality_report: "{{ stages.quality_audit.output.report }}"
      security_report: "{{ stages.security_review.output.report }}"
    gates:
      - all_tests_pass: true
      - no_critical_quality_findings: true
      - no_critical_security_findings: true
      - migrations_present: true
      - no_cbv_or_viewset: true
      - no_direct_orm_in_views: true

output:
  code: "artifacts/code/{{ input.app_name }}/"
  plan: "artifacts/plans/{{ input.app_name }}_plan.md"
  quality_report: "artifacts/reports/{{ input.app_name }}_quality.json"
  security_report: "artifacts/reports/{{ input.app_name }}_security.json"
  status: "{{ stages.validate.status }}"
